version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dra_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dra
      POSTGRES_PASSWORD: dra_secret
      POSTGRES_DB: dra_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dra -d dra_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BACKEND_URL=http://backend:8080
    env_file:
      - apps/web/.env.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_TYPE=${DB_TYPE:-postgres}
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENV=production
      - RATE_LIMIT_RPM=60
    env_file:
      - apps/web/.env.local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  mongodb:
    image: mongo:7
    container_name: dra_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: dra_platform
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    profiles:
      - mongo

volumes:
  postgres_data:
  mongodb_data:
